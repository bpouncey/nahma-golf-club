            - heading "Property Description" [level=5] [ref=e292]
            - paragraph [ref=e293]: MICHIGAN'S UPPER PENINSULA GOLF COURSE ON LAKE MICHIGAN'S BIG BAY de NOC. Have you ever dreamed of owning a Golf Course? The NAHMA GOLF CLUB is this opportunity. You can buy this and run the business with a full bar, storage pole barn, workshop and 9 beautifully groomed holes of waterfront golf. Or perhaps you would like to build your own waterfront home and enjoy your private golf course on the gorgeous acreage. More ideas? You can develop this property with waterfront and golf course frontage homesites for sale or rent. There are already 3 surveyed parcels ready to build or sell separate from the course. So many possibilities with exceptional land and a thriving current Golf Course that has been in existence since 1922 with 90 active members. Buildings and equipment are in good condition, turn key to run the business in 2026. Current owner operates the business 6 months a year and enjoys 6 months of free time. Seller will assist the new owner with a business tutorial in the spring of 2026 to ensure the continuation of a successful operation. The Nahma Golf Club, a member of the UPGA is minutes to US 2 between Rapid River and Manistique providing easy access to travelers along this busy corridor. Most of the members are local but the course invites the public to enjoy the golfing as well. Additionally, several tournaments are operated each year. Sale includes all the inventory, golf carts, mowers, tools, full-service bar and liquor license. The full inventory list is included in this offering. If you like the golfing lifestyle, waterfront and a peaceful area to call your own this could be just what you are looking for. Many possibilities exist here because of the turnkey operation and exceptional, waterfront land. View the online maps to begin to understand the scope of this property.
